<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Management System - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .credential-hint {
            margin-top: 15px;
            padding: 10px;
            background: #e8f4fd;
            border-left: 4px solid #2196F3;
            border-radius: 4px;
            font-size: 14px;
            color: #0c5460;
        }
        
        .credential-hint i {
            margin-right: 5px;
            color: #2196F3;
        }
        
        .demo-credentials {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 5px;
            border: 1px solid #dee2e6;
        }
        
        .demo-credentials h4 {
            margin: 0 0 10px 0;
            color: #495057;
            font-size: 16px;
        }
        
        .demo-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px dashed #dee2e6;
        }
        
        .demo-item:last-child {
            border-bottom: none;
        }
        
        .demo-role {
            font-weight: bold;
            color: #495057;
        }
        
        .demo-creds {
            color: #007bff;
            font-family: monospace;
        }
        
        .test-btn {
            margin-top: 10px;
            padding: 8px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
        }
        
        .test-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2><i class="fas fa-calendar-check"></i> Attendance Management System</h2>
            <div class="role-selector">
                <button class="role-btn active" data-role="STUDENT"><i class="fas fa-user-graduate"></i> Student</button>
                <button class="role-btn" data-role="FACULTY"><i class="fas fa-chalkboard-teacher"></i> Faculty</button>
                <button class="role-btn" data-role="HOD"><i class="fas fa-user-tie"></i> HOD</button>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <div class="input-group">
                    <button type="submit" class="login-btn"><i class="fas fa-sign-in-alt"></i> Login</button>
                </div>
            </form>
            
            <button class="test-btn" onclick="testConnection()"><i class="fas fa-plug"></i> Test Connection</button>
            
            <div id="credentialHint" class="credential-hint">
                <i class="fas fa-info-circle"></i>
                <span id="hintText">Click on role to see credentials</span>
            </div>
            
            <div class="demo-credentials">
                <h4><i class="fas fa-key"></i> Demo Credentials:</h4>
                <div id="demoCredentials">
                    <div class="demo-item">
                        <span class="demo-role">Student:</span>
                        <span class="demo-creds">student1@example.com / 1234</span>
                    </div>
                    <div class="demo-item">
                        <span class="demo-role">Faculty:</span>
                        <span class="demo-creds">amit.sharma@example.com / 1234</span>
                    </div>
                    <div class="demo-item">
                        <span class="demo-role">HOD:</span>
                        <span class="demo-creds">hod.cse@example.com / 1234</span>
                    </div>
                </div>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
        </div>
    </div>
    
    <script src="js/login.js"></script>
</body>
</html>
